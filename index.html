<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jarvis Avatar</title>
<style>
body {margin:0; background:black;}
.jarvis-container {
  position: relative;
  width: 100%;
  max-width: 600px;
  margin:auto;
}
video {
  width:100%;
  border-radius:20px;
  box-shadow:0 0 25px cyan;
}
.glow {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border-radius:20px;
  box-shadow:0 0 60px cyan, 0 0 120px blue;
  pointer-events:none;
  animation:pulse 2s infinite;
}
@keyframes pulse {0% {opacity:0.3;} 50% {opacity:1;} 100% {opacity:0.3;}}
</style>
</head>
<body>
<div class="jarvis-container">
  <video id="jarvisVideo" autoplay loop muted playsinline controls>
    <source src="jarvis.mp4" type="video/mp4">
  </video>
  <div class="glow"></div>
</div>
<script>
const video = document.getElementById("jarvis");

// analyser audio
const audio = new AudioContext();
const analyser = audio.createAnalyser();

navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  const mic = audio.createMediaStreamSource(stream);
  mic.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function animate() {
    analyser.getByteFrequencyData(data);
    let volume = data.reduce((a,b)=>a+b)/data.length;

    if(volume > 20){
      video.playbackRate = 1.2; // parle
      video.style.filter = "brightness(1.5) hue-rotate(180deg)";
    } else {
      video.playbackRate = 0.5; // idle
      video.style.filter = "brightness(1.1)";
    }

    requestAnimationFrame(animate);
  }

  animate();
});
</script>
</body>
</html>
